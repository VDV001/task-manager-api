services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["./migrate", "up"]
    environment:
      DB_HOST: postgres
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_HOST: postgres
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-taskmanager}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-taskmanager}
      POSTGRES_DB: ${DB_NAME:-taskmanager}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-taskmanager}"]
      interval: 2s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
