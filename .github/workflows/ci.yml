name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          install-mode: goinstall

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Run unit tests
        run: go test -v -race -count=1 -coverprofile=coverage.out ./internal/... ./pkg/...
      - name: Upload coverage
        uses: actions/upload-artifact@v5
        with:
          name: coverage
          path: coverage.out

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Run integration tests
        run: go test -v -race -count=1 -tags=integration ./tests/...

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build

  build:
    runs-on: ubuntu-latest
    needs: [lint, test, web]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Build binaries
        run: |
          go build -ldflags="-s -w" -o bin/api ./cmd/api
          go build -ldflags="-s -w" -o bin/migrate ./cmd/migrate
      - name: Build Docker image
        run: docker build -t task-manager-api:ci .
